<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntegrityCore Dashboard</title>

    <!-- React & ReactDOM (Development for now) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for transpiling JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                        },
                        brand: {
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'typewriter': 'typewriter 2s steps(44) 1s 1 normal both',
                        'blinkCaret': 'blinkCaret 500ms steps(44) infinite normal',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': {
                                opacity: 1,
                                transform: 'scale(1)',
                                boxShadow: '0 0 15px rgba(59, 130, 246, 0.5)'
                            },
                            '50%': {
                                opacity: .8,
                                transform: 'scale(1.02)',
                                boxShadow: '0 0 25px rgba(59, 130, 246, 0.8)'
                            },
                        },
                        typewriter: {
                            from: { width: '0' },
                            to: { width: '100%' }
                        },
                        blinkCaret: {
                            from: { borderRightColor: 'rgba(255,255,255,0.75)' },
                            to: { borderRightColor: 'transparent' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Inter', -apple-system, sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
        }

        .integritycore-header {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
        }

        .dag-node {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 18px;
            background: rgba(15, 23, 42, 0.8);
            min-width: 160px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .node-status-success {
            border-left: 4px solid #10b981;
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .node-status-running {
            border-left: 4px solid #3b82f6;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, rgba(15, 23, 42, 0.8) 100%);
        }

        .node-status-failed {
            border-left: 4px solid #ef4444;
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .node-status-pending {
            border-left: 4px solid #475569;
            opacity: 0.5;
            filter: grayscale(100%);
        }

        .arrow {
            width: 50px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.2);
            position: relative;
            margin: 0 12px;
            transition: all 0.3s ease;
        }

        .arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: -5px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 6px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .arrow-active {
            background-color: #3b82f6;
            box-shadow: 0 0 8px #3b82f6;
        }

        .arrow-active::after {
            border-left-color: #3b82f6;
        }

        .arrow-failed {
            background-color: #ef4444;
        }

        .arrow-failed::after {
            border-left-color: #ef4444;
        }

        /* Hacker terminal styling */
        .terminal-text {
            border-right: .15em solid rgba(255, 255, 255, 0.75);
            white-space: nowrap;
            overflow: hidden;
        }

        /* Custom scrollbar for dark mode */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.8);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 1);
        }
    </style>
</head>

<body class="antialiased selection:bg-brand-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [status, setStatus] = useState("idle");
            const [errorMsg, setErrorMsg] = useState("");
            const [steps, setSteps] = useState({
                generate: { status: "pending" },
                verify: { status: "pending" },
                repair: { status: "pending" },
                execute: { status: "pending" }
            });
            const [finalSql, setFinalSql] = useState("");
            const [logs, setLogs] = useState([]);
            const [prompt, setPrompt] = useState("Create an ETL pipeline that loads user active sessions into the analytics schema. Only load sessions that have been updated since the last pipeline run.");
            const [sourceDb, setSourceDb] = useState("");
            const [targetDb, setTargetDb] = useState("");
            const [model, setModel] = useState("gemini/gemini-2.5-pro");

            // Connection Manager State
            const [activeTab, setActiveTab] = useState("dashboard");
            const [connections, setConnections] = useState([]);
            const [newConn, setNewConn] = useState({ name: "", dialect: "POSTGRESQL", host: "", port: "", database: "", username: "", password: "", account: "", warehouse: "", project_id: "", dataset_id: "", service_account_json: "" });
            const [testStatuses, setTestStatuses] = useState({});
            const [editingConn, setEditingConn] = useState(null);
            const [editForm, setEditForm] = useState({});

            // Explorer state
            const [exConn, setExConn] = useState(""); // selected connection id
            const [exTree, setExTree] = useState([]); // [{database, schemas:[]}]
            const [exSelDb, setExSelDb] = useState("");
            const [exSelSchema, setExSelSchema] = useState("PUBLIC");
            const [exTables, setExTables] = useState([]);
            const [exSelTable, setExSelTable] = useState(null);
            const [exColumns, setExColumns] = useState([]);
            const [exPreview, setExPreview] = useState({ columns: [], rows: [] });
            const [exSubTab, setExSubTab] = useState("schema"); // 'schema' | 'data'
            const [exSql, setExSql] = useState("SELECT * FROM ZILLOW.PUBLIC.CITY LIMIT 100;");
            const [exQueryResult, setExQueryResult] = useState(null);
            const [exLoading, setExLoading] = useState(""); // 'tree'|'tables'|'preview'|'query'|''
            const [exError, setExError] = useState("");

            // Fetch connections on load
            useEffect(() => {
                fetchConnections();
            }, []);

            const fetchConnections = async () => {
                try {
                    const res = await fetch("/api/connections");
                    const data = await res.json();
                    setConnections(data);
                    if (data.length > 0 && !sourceDb) setSourceDb(data[0].name);
                    if (data.length > 0 && !targetDb) setTargetDb(data[0].name);
                } catch (err) {
                    console.error("Failed to fetch connections", err);
                }
            };

            const handleCreateConnection = async (e) => {
                e.preventDefault();
                try {
                    await fetch("/api/connections", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(newConn)
                    });
                    setNewConn({ name: "", dialect: "POSTGRESQL", host: "", port: "", database: "", username: "", password: "", account: "", warehouse: "", project_id: "", dataset_id: "", service_account_json: "" });
                    fetchConnections();
                } catch (err) {
                    console.error("Error creating connection");
                }
            };

            const handleTestConnection = async (id) => {
                setTestStatuses(prev => ({ ...prev, [id]: { state: 'testing', logs: [] } }));
                try {
                    const res = await fetch("/api/connections/test", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ id })
                    });
                    const data = await res.json();
                    setTestStatuses(prev => ({
                        ...prev,
                        [id]: { state: data.status === 'success' ? 'success' : 'error', message: data.message, logs: data.logs || [] }
                    }));
                } catch (err) {
                    setTestStatuses(prev => ({ ...prev, [id]: { state: 'error', message: 'Network timeout.', logs: ['[Test] ❌ Network timeout.'] } }));
                }
            };

            const handleEditConnection = (c) => {
                setEditingConn(c.id);
                setEditForm({ ...c });
            };

            const handleSaveConnection = async () => {
                try {
                    await fetch(`/api/connections/${editingConn}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(editForm)
                    });
                    setEditingConn(null);
                    fetchConnections();
                } catch (err) {
                    console.error('Failed to save connection', err);
                }
            };

            // Explorer helpers
            const exLoadTree = async (connId) => {
                setExLoading('tree'); setExError('');
                try {
                    const r = await fetch(`/api/explore/schemas?conn_id=${connId}`);
                    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
                    const data = await r.json();
                    setExTree(data);
                    if (data.length > 0) { setExSelDb(data[0].database); }
                } catch (e) { setExError(String(e)); }
                setExLoading('');
            };

            const exLoadTables = async (connId, db, schema) => {
                setExLoading('tables'); setExError(''); setExSelTable(null); setExColumns([]); setExPreview({ columns: [], rows: [] });
                try {
                    const r = await fetch(`/api/explore/tables?conn_id=${connId}&database=${db}&schema=${schema}`);
                    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
                    const data = await r.json();
                    setExTables(data.tables);
                } catch (e) { setExError(String(e)); }
                setExLoading('');
            };

            const exSelectTable = async (tableName) => {
                setExSelTable(tableName); setExLoading('preview'); setExError('');
                try {
                    const base = `conn_id=${exConn}&database=${exSelDb}&schema=${exSelSchema}&table=${tableName}`;
                    const [colRes, preRes] = await Promise.all([
                        fetch(`/api/explore/columns?${base}`),
                        fetch(`/api/explore/preview?${base}&limit=50`)
                    ]);
                    const colData = await colRes.json();
                    const preData = await preRes.json();
                    setExColumns(colData.columns || []);
                    setExPreview(preData);
                    setExSubTab('data');
                } catch (e) { setExError(String(e)); }
                setExLoading('');
            };

            const exRunQuery = async () => {
                setExLoading('query'); setExError(''); setExQueryResult(null);
                try {
                    const r = await fetch('/api/explore/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ conn_id: exConn, sql: exSql })
                    });
                    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
                    setExQueryResult(await r.json());
                } catch (e) { setExError(String(e)); }
                setExLoading('');
            };

            React.useEffect(() => {
                if (exConn) exLoadTree(exConn);
            }, [exConn]);

            React.useEffect(() => {
                if (exConn && exSelDb && exSelSchema) exLoadTables(exConn, exSelDb, exSelSchema);
            }, [exSelDb, exSelSchema]);

            const handleDeleteConnection = async (id) => {
                if (!window.confirm("Are you sure you want to delete this connection?")) return;

                try {
                    const res = await fetch(`/api/connections/${id}`, {
                        method: "DELETE"
                    });
                    if (res.ok) {
                        fetchConnections();
                    } else {
                        console.error("Failed to delete connection.");
                    }
                } catch (err) {
                    console.error("Error deleting connection", err);
                }
            };

            const pollStatus = async () => {
                try {
                    const res = await fetch("/api/status");
                    const data = await res.json();
                    setStatus(data.status);
                    setSteps(data.steps);

                    if (data.final_sql) setFinalSql(data.final_sql);
                    if (data.error) setErrorMsg(data.error);
                    if (data.logs) setLogs(data.logs);

                    if (data.status === "running") {
                        setTimeout(pollStatus, 1500);
                    }
                } catch (e) {
                    console.error("Failed to poll status", e);
                }
            };

            const runDag = async () => {
                setStatus("running");
                setFinalSql("");
                setErrorMsg("");
                setLogs([]);
                setSteps({
                    generate: { status: "running" },
                    verify: { status: "pending" },
                    repair: { status: "pending" },
                    execute: { status: "pending" }
                });

                try {
                    await fetch("/api/verify", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            prompt: prompt,
                            strategy: "INCREMENTAL",
                            model: model,
                            source: sourceDb,
                            target: targetDb
                        })
                    });
                    setTimeout(pollStatus, 1000);
                } catch (e) {
                    alert("Failed to start DAG: " + e.message);
                }
            };

            const getNodeClass = (statusStr) => {
                if (statusStr === "success") return "node-status-success";
                if (statusStr === "running") return "node-status-running animate-pulse-glow";
                if (statusStr === "failed") return "node-status-failed";
                return "node-status-pending";
            };

            // Logic to determine arrow highlight color based on previous node
            const genToVerifyArrow = steps.generate.status === 'success' || steps.generate.status === 'running'
                ? 'arrow-active' : '';
            const verifyToRepairArrow = steps.verify.status === 'failed'
                ? 'arrow-failed' : (steps.verify.status === 'success' ? 'arrow-active' : '');

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="integritycore-header p-4 flex justify-between items-center z-20">
                        <div className="flex items-center space-x-3">
                            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-indigo-600 flex items-center justify-center text-white font-bold shadow-lg">
                                IC
                            </div>
                            <span className="text-xl font-bold tracking-tight text-white drop-shadow-sm">IntegrityCore</span>
                            <span className="bg-slate-800 border border-slate-700 text-xs px-2 py-1 rounded text-slate-300 font-mono">v0.1.0</span>
                        </div>
                        <div className="flex space-x-2 bg-slate-800/80 p-1 rounded-lg border border-slate-700">
                            <button
                                onClick={() => setActiveTab("dashboard")}
                                className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${activeTab === "dashboard" ? "bg-brand-500 text-white shadow-lg" : "text-slate-400 hover:text-white"}`}>
                                Dashboard
                            </button>
                            <button
                                onClick={() => setActiveTab("connections")}
                                className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${activeTab === "connections" ? "bg-brand-500 text-white shadow-lg" : "text-slate-400 hover:text-white"}`}>
                                Connections
                            </button>
                            <button
                                onClick={() => setActiveTab("explorer")}
                                className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${activeTab === "explorer" ? "bg-brand-500 text-white shadow-lg" : "text-slate-400 hover:text-white"}`}>
                                🔍 Explorer
                            </button>
                        </div>
                        <div className="flex space-x-5 text-sm font-medium">
                            <div className="flex items-center text-emerald-400 group"><span className="w-2.5 h-2.5 bg-emerald-500 rounded-full inline-block mr-2 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span> Success</div>
                            <div className="flex items-center text-rose-400"><span className="w-2.5 h-2.5 bg-rose-500 rounded-full inline-block mr-2 shadow-[0_0_8px_rgba(244,63,94,0.5)]"></span> Failed</div>
                            <div className="flex items-center text-brand-400"><span className="w-2.5 h-2.5 bg-brand-500 rounded-full inline-block mr-2 shadow-[0_0_8px_rgba(59,130,246,0.8)] animate-pulse"></span> Running</div>
                        </div>
                    </header>

                    {activeTab === "dashboard" && (
                        <main className="flex-1 p-6 grid grid-cols-12 gap-8 relative z-10 w-full max-w-screen-2xl mx-auto">
                            {/* Control Panel (Left) */}
                            <div className="col-span-4 glass-panel p-6 flex flex-col h-full">
                                <div className="flex items-center mb-6 border-b border-slate-700 pb-3">
                                    <svg className="w-5 h-5 text-brand-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    <h2 className="text-lg font-bold text-slate-100 uppercase tracking-wide">Configuration</h2>
                                </div>

                                <div className="space-y-4 flex-1">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Source (Extract)</label>
                                            <select value={sourceDb} onChange={(e) => setSourceDb(e.target.value)} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-500">
                                                {connections.length === 0 && <option value="">No connections found</option>}
                                                {connections.map(c => <option key={c.id} value={c.name}>{c.name} ({c.dialect})</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Target (Load)</label>
                                            <select value={targetDb} onChange={(e) => setTargetDb(e.target.value)} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-500">
                                                {connections.length === 0 && <option value="">No connections found</option>}
                                                {connections.map(c => <option key={c.id} value={c.name}>{c.name} ({c.dialect})</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Engine (via ADK)</label>
                                            <select value={model} onChange={(e) => setModel(e.target.value)} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-500">
                                                <option value="gemini/gemini-2.5-pro">Gemini 2.5 Pro</option>
                                                <option value="anthropic/claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                                                <option value="gpt-4-turbo">GPT-4 Turbo</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Verification</label>
                                            <select className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-brand-500">
                                                <option>INCREMENTAL</option>
                                                <option>FULL_REFRESH</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="flex-1 flex flex-col h-full mt-2">
                                        <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-wider">ETL Objective</label>
                                        <textarea
                                            className="w-full flex-1 min-h-[130px] border border-slate-600 rounded-lg p-3 bg-slate-800/50 text-slate-300 focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-transparent transition-all font-mono text-xs resize-none"
                                            value={prompt}
                                            onChange={(e) => setPrompt(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <button
                                    onClick={runDag}
                                    disabled={status === "running"}
                                    className={`w-full mt-6 text-white font-bold py-3.5 px-4 rounded-lg transition-all flex items-center justify-center shadow-md
                                    ${status === "running" ? 'bg-brand-800 cursor-not-allowed border border-brand-700' : 'bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 border border-transparent group hover:-translate-y-0.5 hover:shadow-lg'}`}>

                                    {status === "running" ? (
                                        <><svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Executing DAG...</>
                                    ) : (
                                        <>Trigger DAG Pipeline <svg className="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></>
                                    )}
                                </button>
                            </div>

                            {/* Graph and Logs (Right) */}
                            <div className="col-span-8 flex flex-col space-y-6">

                                {/* Visual Graph View */}
                                <div className="glass-panel p-6 flex-1 flex flex-col relative overflow-hidden group">
                                    <h3 className="text-sm font-semibold text-slate-400 absolute top-4 left-6 z-20 uppercase tracking-wider flex items-center">
                                        <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                                        Execution Graph
                                    </h3>

                                    {/* Background Dot Grid */}

                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Username</label>
                                                    <input type="text" value={newConn.username} onChange={e => setNewConn({ ...newConn, username: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Password</label>
                                                    <input type="password" value={newConn.password} onChange={e => setNewConn({ ...newConn, password: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" />
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {newConn.dialect === 'SNOWFLAKE' && (
                                        <>
                                            <div>
                                                <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Account Locator</label>
                                                <input required type="text" value={newConn.account} onChange={e => setNewConn({ ...newConn, account: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" placeholder="xy12345.us-east-1" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 mt-3">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Database</label>
                                                    <input type="text" value={newConn.database} onChange={e => setNewConn({ ...newConn, database: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Warehouse</label>
                                                    <input type="text" value={newConn.warehouse} onChange={e => setNewConn({ ...newConn, warehouse: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 mt-3">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Username</label>
                                                    <input type="text" value={newConn.username} onChange={e => setNewConn({ ...newConn, username: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Password</label>
                                                    <input type="password" value={newConn.password} onChange={e => setNewConn({ ...newConn, password: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" />
                                                </div>
                                            </div>
                                        </>
                                    )}

                                    {newConn.dialect === 'BIGQUERY' && (
                                        <>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Project ID</label>
                                                    <input required type="text" value={newConn.project_id} onChange={e => setNewConn({ ...newConn, project_id: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" placeholder="my-gcp-project" />
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Dataset ID</label>
                                                    <input required type="text" value={newConn.dataset_id} onChange={e => setNewConn({ ...newConn, dataset_id: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" placeholder="analytics_ds" />
                                                </div>
                                            </div>
                                            <div className="mt-3">
                                                <label className="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase">Service Account JSON (Base64)</label>
                                                <input type="password" value={newConn.service_account_json} onChange={e => setNewConn({ ...newConn, service_account_json: e.target.value })} className="w-full border border-slate-600 rounded p-2 bg-slate-800/80 text-slate-200 focus:ring-1 focus:ring-teal-500 text-sm" />
                                            </div>
                                        </>
                                    )}

                                    <button type="submit" className="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 px-4 rounded transition-all mt-4 font-mono text-sm shadow-md hover:shadow-lg">
                                        SAVE CONNECTION
                                    </button>
                                </form>
                            </div>

                            {/* Configured Connections Table */}
                            <div className="glass-panel rounded-2xl p-6 flex flex-col relative overflow-hidden border border-slate-700/50 shadow-md col-span-2">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-slate-600 to-slate-500"></div>
                                <div className="flex items-center mb-6">
                                    <h2 className="text-lg font-bold text-slate-100 uppercase tracking-wide flex-1">Configured Adapters</h2>
                                    <button onClick={fetchConnections}
                                        className="text-[10px] font-bold px-3 py-1.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 hover:text-white transition-colors">
                                        🔄 Refresh
                                    </button>
                                </div>

                                <div className="overflow-y-auto flex-1 h-full">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b border-slate-700 text-xs font-bold text-slate-400 uppercase tracking-wider">
                                                <th className="pb-3 text-left w-1/4">Name</th>
                                                <th className="pb-3 text-left w-1/6">Dialect</th>
                                                <th className="pb-3 text-left w-1/2">Details</th>
                                                <th className="pb-3 text-right">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-sm">
                                            {connections.length === 0 && (
                                                <tr><td colSpan="4" className="py-8 text-center text-slate-500 italic">No connections configured yet.</td></tr>
                                            )}
                                            {connections.map(c => (
                                                <React.Fragment key={c.id}>
                                                    <tr className="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors">
                                                        <td className="py-4 font-semibold text-slate-200">{c.name}</td>
                                                        <td className="py-4 text-brand-400 font-mono text-[10px] font-bold">{c.dialect}</td>
                                                        <td className="py-4 text-slate-400 truncate max-w-[200px] font-mono text-xs">
                                                            {c.dialect === 'SNOWFLAKE' ? c.account : (c.dialect === 'BIGQUERY' ? c.project_id : (c.host || '') + (c.port ? ':' + c.port : ''))}
                                                        </td>
                                                        <td className="py-4 text-right">
                                                            <div className="flex gap-2 justify-end items-center">
                                                                {testStatuses[c.id]?.state === 'testing' && (
                                                                    <span className="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-bold bg-amber-900/40 text-amber-400 border border-amber-800/50 uppercase animate-pulse">Connecting...</span>
                                                                )}
                                                                {testStatuses[c.id]?.state === 'success' && (
                                                                    <span className="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-bold bg-emerald-900/40 text-emerald-400 border border-emerald-800/50 uppercase">✅ Verified</span>
                                                                )}
                                                                {testStatuses[c.id]?.state === 'error' && (
                                                                    <span className="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-bold bg-red-900/40 text-red-400 border border-red-800/50 uppercase">❌ Failed</span>
                                                                )}
                                                                <button onClick={() => handleEditConnection(c)} className="text-[10px] uppercase font-bold text-slate-400 hover:text-indigo-400 transition-colors border border-slate-700 hover:border-indigo-500 rounded px-2 py-[2px] bg-slate-800/80 shadow-sm">
                                                                    Edit
                                                                </button>
                                                                <button onClick={() => handleTestConnection(c.id)} disabled={testStatuses[c.id]?.state === 'testing'} className="text-[10px] uppercase font-bold text-slate-400 hover:text-teal-400 transition-colors border border-slate-700 hover:border-teal-500 rounded px-2 py-[2px] bg-slate-800/80 shadow-sm disabled:opacity-50">
                                                                    Test
                                                                </button>
                                                                <button onClick={() => handleDeleteConnection(c.id)} className="text-[10px] uppercase font-bold text-slate-400 hover:text-red-400 transition-colors border border-slate-700 hover:border-red-500 rounded px-2 py-[2px] bg-slate-800/80 shadow-sm" title="Delete Connection">
                                                                    ✕
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>

                                                    {/* Inline Edit Form */}
                                                    {editingConn === c.id && (
                                                        <tr className="bg-slate-800/50">
                                                            <td colSpan="4" className="p-4">
                                                                <div className="border border-indigo-700/50 rounded-lg p-4 space-y-3">
                                                                    <div className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-2">✏️ Edit Connection: {c.name}</div>
                                                                    <div className="grid grid-cols-2 gap-3">
                                                                        <div><label className="block text-[10px] text-slate-400 mb-1 uppercase">Name</label><input value={editForm.name || ''} onChange={e => setEditForm({ ...editForm, name: e.target.value })} className="w-full border border-slate-600 rounded p-1.5 bg-slate-900 text-slate-200 text-xs" /></div>
                                                                        <div><label className="block text-[10px] text-slate-400 mb-1 uppercase">Account Locator</label><input value={editForm.account || ''} onChange={e => setEditForm({ ...editForm, account: e.target.value })} className="w-full border border-slate-600 rounded p-1.5 bg-slate-900 text-slate-200 text-xs" placeholder="e.g. xy12345-ab67890" /></div>
                                                                        <div><label className="block text-[10px] text-slate-400 mb-1 uppercase">Username</label><input value={editForm.username || ''} onChange={e => setEditForm({ ...editForm, username: e.target.value })} className="w-full border border-slate-600 rounded p-1.5 bg-slate-900 text-slate-200 text-xs" /></div>
                                                                        <div><label className="block text-[10px] text-slate-400 mb-1 uppercase">Password</label><input type="password" value={editForm.password || ''} onChange={e => setEditForm({ ...editForm, password: e.target.value })} className="w-full border border-slate-600 rounded p-1.5 bg-slate-900 text-slate-200 text-xs" /></div>
                                                                        <div><label className="block text-[10px] text-slate-400 mb-1 uppercase">Database</label><input value={editForm.database || ''} onChange={e => setEditForm({ ...editForm, database: e.target.value })} className="w-full border border-slate-600 rounded p-1.5 bg-slate-900 text-slate-200 text-xs" /></div>
                                                                        <div><label className="block text-[10px] text-slate-400 mb-1 uppercase">Warehouse</label><input value={editForm.warehouse || ''} onChange={e => setEditForm({ ...editForm, warehouse: e.target.value })} className="w-full border border-slate-600 rounded p-1.5 bg-slate-900 text-slate-200 text-xs" /></div>
                                                                    </div>
                                                                    <div className="flex gap-2 mt-2">
                                                                        <button onClick={handleSaveConnection} className="text-[11px] font-bold px-4 py-1.5 rounded bg-indigo-600 hover:bg-indigo-500 text-white transition-colors">Save Changes</button>
                                                                        <button onClick={() => setEditingConn(null)} className="text-[11px] font-bold px-4 py-1.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 transition-colors">Cancel</button>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}

                                                    {/* Connection Test Logs Terminal */}
                                                    {testStatuses[c.id]?.logs?.length > 0 && (
                                                        <tr className="bg-black/40">
                                                            <td colSpan="4" className="px-4 pb-4 pt-2">
                                                                <div className="border border-slate-700 rounded-lg overflow-hidden">
                                                                    <div className="bg-slate-900/80 px-3 py-1.5 text-[9px] font-bold text-slate-500 uppercase tracking-widest border-b border-slate-700 flex justify-between">
                                                                        <span>⚡ Connection Test Log — {c.name}</span>
                                                                        <button onClick={() => setTestStatuses(prev => { const n = { ...prev }; delete n[c.id]; return n; })} className="text-slate-600 hover:text-slate-400">✕</button>
                                                                    </div>
                                                                    <div className="p-3 font-mono text-[11px] space-y-0.5 max-h-48 overflow-y-auto">
                                                                        {testStatuses[c.id].logs.map((line, i) => (
                                                                            <div key={i} className={`${line.includes('❌') ? 'text-rose-400' : line.includes('✅') ? 'text-emerald-400' : 'text-slate-300'}`}>{line}</div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}
                                                </React.Fragment>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
