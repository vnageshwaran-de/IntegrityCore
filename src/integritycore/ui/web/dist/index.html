                                        </div>
                                    </div>
                                    {err && <p style={{ color: '#f87171', fontSize: '13px' }}>⚠ {err}</p>}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Run History / Logs Panel ────────────────────────────────────────────────
        function RunPanel({ job, onClose }) {
            const [runs, setRuns] = useState([]);
            const [selRun, setSelRun] = useState(null);
            const [logs, setLogs] = useState('');
            const logRef = useRef(null);

            const loadRuns = () => API(`/api/jobs/${job.id}/runs`).then(r => { setRuns(r); if (r.length && !selRun) setSelRun(r[0]); }).catch(() => { });
            useEffect(() => { loadRuns(); const t = setInterval(loadRuns, 5000); return () => clearInterval(t); }, [job.id]);

            useEffect(() => {
                if (!selRun) return;
                setLogs(selRun.logs || '(no logs yet)');
                if (selRun.status === 'running') {
                    const es = new EventSource(`/api/runs/${selRun.id}/logs`);
                    let buf = '';
                    es.onmessage = e => {
                        if (e.data === '[DONE]') { es.close(); loadRuns(); return; }
                        buf += e.data + '\n'; setLogs(buf);
                        setTimeout(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, 50);
                    };
                    es.onerror = () => es.close();
                    return () => es.close();
                }
            }, [selRun?.id]);

            useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [logs]);

            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.75)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div className="glass rounded-2xl w-full max-w-5xl fade-in" style={{ maxHeight: '90vh', display: 'flex', flexDirection: 'column' }}>
                        <div style={{ padding: '20px 24px', borderBottom: '1px solid rgba(99,102,241,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
                            <div>
                                <h2 style={{ fontSize: '16px', fontWeight: 700, color: '#fff' }}>📋 Run History — {job.name}</h2>
                                <p style={{ fontSize: '11px', color: '#64748b', marginTop: '2px' }}>{runs.length} runs</p>
                            </div>
                            <button onClick={onClose} style={{ background: 'rgba(239,68,68,0.15)', border: '1px solid rgba(239,68,68,0.3)', color: '#f87171', padding: '6px 14px', borderRadius: '8px', cursor: 'pointer', fontWeight: 600, fontSize: '13px' }}>✕ Close</button>
                        </div>
                        <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
                            {/* Left: run list */}
                            <div style={{ width: '240px', borderRight: '1px solid rgba(99,102,241,0.1)', overflowY: 'auto' }}>
                                {runs.map(r => (
                                    <div key={r.id} onClick={() => setSelRun(r)}
                                        style={{
                                            padding: '14px 16px', cursor: 'pointer', borderBottom: '1px solid rgba(30,41,59,0.8)',
                                            background: selRun?.id === r.id ? 'rgba(99,102,241,0.1)' : 'transparent',
                                            borderLeft: selRun?.id === r.id ? '3px solid #6366f1' : '3px solid transparent',
                                        }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
                                            <StatusBadge s={r.status} />
                                            <span style={{ fontSize: '10px', color: '#64748b' }}>{r.triggered_by}</span>
                                        </div>
                                        <div style={{ fontSize: '11px', color: '#94a3b8' }}>{fmt_rel(r.started_at)}</div>
                                        <div style={{ fontSize: '11px', color: '#64748b', marginTop: '2px' }}>{fmt_dur(r.duration_seconds)} · {r.rows_processed} rows</div>
                                    </div>
                                ))}
                                {runs.length === 0 && <p style={{ padding: '20px', fontSize: '12px', color: '#475569', fontStyle: 'italic' }}>No runs yet</p>}
                            </div>
                            {/* Right: log detail */}
                            <div style={{ flex: 1, padding: '20px', display: 'flex', flexDirection: 'column', gap: '12px', overflow: 'hidden' }}>
                                {selRun && (
                                    <>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap' }}>
                                            <StatusBadge s={selRun.status} />
                                            <span style={{ fontSize: '11px', color: '#94a3b8' }}>Started: {fmt_dt(selRun.started_at)}</span>
                                            <span style={{ fontSize: '11px', color: '#94a3b8' }}>Duration: {fmt_dur(selRun.duration_seconds)}</span>
                                            <span style={{ fontSize: '11px', color: '#94a3b8' }}>Rows: {selRun.rows_processed}</span>
                                            {selRun.verified && <span className="badge badge-green">✓ SMT Verified</span>}
                                        </div>
                                        {selRun.generated_sql && (
                                            <div>
                                                <p className="label" style={{ marginBottom: '6px' }}>Generated SQL</p>
                                                <pre className="log-box" style={{ maxHeight: '120px', color: '#a5b4fc' }}>{selRun.generated_sql}</pre>
                                            </div>
                                        )}
                                        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
                                            <p className="label" style={{ marginBottom: '6px' }}>
                                                Execution Logs {selRun.status === 'running' && <span style={{ color: '#fbbf24' }} className="pulse">● LIVE</span>}
                                            </p>
                                            <div ref={logRef} className="log-box" style={{ flex: 1 }}>{logs || '(empty)'}</div>
                                        </div>
                                        {selRun.error_msg && <div style={{ color: '#f87171', fontSize: '12px', fontFamily: "'JetBrains Mono', monospace", padding: '12px', background: 'rgba(239,68,68,0.1)', borderRadius: '8px' }}>❌ {selRun.error_msg}</div>}
                                    </>
                                )}
                                {!selRun && <p style={{ color: '#64748b', fontStyle: 'italic', margin: 'auto' }}>Select a run on the left</p>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Jobs Tab ────────────────────────────────────────────────────────────────
        function JobsTab({ conns }) {
            const [jobs, setJobs] = useState([]);
            const [showBuilder, setShowBuilder] = useState(false);
            const [editJob, setEditJob] = useState(null);
            const [histJob, setHistJob] = useState(null);
            const [loading, setLoading] = useState(false);
            const [triggering, setTriggering] = useState({});
            const [deleteConfirm, setDeleteConfirm] = useState(null); // Custom modal state

            const load = () => API('/api/jobs').then(setJobs).catch(() => { });
            useEffect(() => {
                load();
                const t = setInterval(load, 10000); return () => clearInterval(t);
            }, []);

            const triggerRun = async (id) => {
                setTriggering(p => ({ ...p, [id]: true }));
                try { await API(`/api/jobs/${id}/run`, { method: 'POST' }); load(); } catch (e) { alert(e.message); }
                setTimeout(() => setTriggering(p => ({ ...p, [id]: false })), 2000);
            };
            const togglePause = async (job) => {
                const ep = job.status === 'active' ? 'pause' : 'resume';
                await API(`/api/jobs/${job.id}/${ep}`, { method: 'POST' }); load();
            };

            const confirmDeleteJob = (id) => setDeleteConfirm(id);
            const executeDelete = async () => {
                const id = deleteConfirm;
                setDeleteConfirm(null);
                if (!id) return;
                try {
                    await API(`/api/jobs/${id}`, { method: 'DELETE' });
                    load();
                } catch (e) {
                    alert('Error deleting job: ' + e.message);
                }
            };

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h1 className="text-2xl font-bold text-white">⚡ ETL Jobs</h1>
                            <p className="text-sm text-slate-400 mt-1">{jobs.length} jobs · Interactive LLM-powered pipelines</p>
                        </div>
                        <div className="flex gap-3">
                            <button className="btn btn-ghost btn-sm" onClick={load}>🔄 Refresh</button>
                            <button className="btn btn-primary" onClick={() => { setEditJob(null); setShowBuilder(true); }}>＋ New Job</button>
                        </div>
                    </div>

                    {jobs.length === 0 ? (
                        <div className="glass2 rounded-2xl p-16 text-center">
                            <div className="text-5xl mb-4">⚡</div>
                            <h3 className="text-xl font-bold text-white mb-2">No jobs yet</h3>
                            <p className="text-slate-400 mb-6">Create your first LLM-powered ETL pipeline</p>
                            <button className="btn btn-primary" onClick={() => setShowBuilder(true)}>＋ Create First Job</button>
                        </div>
                    ) : (
                        <div className="glass2 rounded-xl overflow-hidden">
                            <table>
                                <thead><tr>
                                    <th>Job</th><th>Source → Target</th><th>Schedule</th><th>Last Run</th><th>Next Run</th><th>Status</th><th>Actions</th>
                                </tr></thead>
                                <tbody>
                                    {jobs.map(j => (
                                        <tr key={j.id}>
                                            <td>
                                                <div className="font-semibold text-slate-200">{j.name}</div>
                                                {j.description && <div className="text-xs text-slate-500 mt-0.5">{j.description}</div>}
                                            </td>
                                            <td className="text-xs text-slate-400 mono">{j.source_conn_id.slice(0, 12)} → {j.target_conn_id.slice(0, 12)}</td>
                                            <td className="text-xs">{j.schedule_label || <span className="text-slate-600 italic">manual</span>}</td>
                                            <td>
                                                {j.last_run ? (<div><StatusBadge s={j.last_run.status} /><div className="text-xs text-slate-500 mt-1">{fmt_rel(j.last_run.started_at)}</div></div>) : <span className="text-slate-600 italic text-xs">never</span>}
                                            </td>
                                            <td className="text-xs text-slate-400 mono">{j.next_run ? new Date(j.next_run).toLocaleString() : '—'}</td>
                                            <td><StatusBadge s={j.status} /></td>
                                            <td>
                                                <div className="flex items-center gap-2 flex-wrap">
                                                    <button className="btn btn-ghost btn-sm" title="Run now" disabled={!!triggering[j.id]} onClick={() => triggerRun(j.id)}>
                                                        {triggering[j.id] ? <span className="spin">⟳</span> : '▶'}
                                                    </button>
                                                    <button className="btn btn-ghost btn-sm" title="History" onClick={() => setHistJob(j)}>📋</button>
                                                    <button className="btn btn-ghost btn-sm" title="Edit" onClick={() => { setEditJob(j); setShowBuilder(true); }}>✏️</button>
                                                    <button className="btn btn-ghost btn-sm" title={j.status === 'active' ? 'Pause' : 'Resume'} onClick={() => togglePause(j)}>
                                                        {j.status === 'active' ? '⏸' : '▶'}
                                                    </button>
                                                    <button className="btn btn-danger btn-sm" title="Delete" onClick={() => confirmDeleteJob(j.id)}>🗑</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {showBuilder && <JobBuilderModal conns={conns} editJob={editJob} onSave={() => { setShowBuilder(false); setEditJob(null); load(); }} onClose={() => { setShowBuilder(false); setEditJob(null); }} />}
                    {histJob && <RunPanel job={histJob} onClose={() => setHistJob(null)} />}
                    {deleteConfirm && (
                        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyItems: 'center', justifyContent: 'center' }}>
                            <div className="glass2 rounded-2xl p-6 fade-in" style={{ width: '400px', textAlign: 'center' }}>
                                <div style={{ fontSize: '40px', marginBottom: '16px' }}>⚠️</div>
                                <h3 style={{ fontSize: '18px', fontWeight: 700, color: 'white', marginBottom: '8px' }}>Delete Confirmation</h3>
                                <p style={{ color: '#94a3b8', fontSize: '14px', marginBottom: '24px' }}>Are you sure you want to completely delete this job and all its run history? This action cannot be undone.</p>
                                <div style={{ display: 'flex', gap: '12px', justifyContent: 'center' }}>
                                    <button className="btn btn-ghost" onClick={() => setDeleteConfirm(null)}>Cancel</button>
                                    <button className="btn btn-danger" onClick={executeDelete}>Yes, Delete</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ─── Explorer Tab ────────────────────────────────────────────────────────────
        function ExplorerTab() {
            const [conns, setConns] = useState([]);
            const [exConn, setExConn] = useState('');
            const [exTree, setExTree] = useState([]);
            const [exSelDb, setExSelDb] = useState('');
            const [exSelSchema, setExSelSchema] = useState('');
            const [exTables, setExTables] = useState([]);
            const [exSelTable, setExSelTable] = useState(null);
            const [exColumns, setExColumns] = useState([]);
            const [exPreview, setExPreview] = useState({ columns: [], rows: [] });
            const [exSubTab, setExSubTab] = useState('schema');
            const [exSql, setExSql] = useState('SELECT * FROM table LIMIT 100;');
            const [exQueryResult, setExQueryResult] = useState(null);
            const [exLoading, setExLoading] = useState('');
            const [exError, setExError] = useState('');

            useEffect(() => { API('/api/connections').then(d => setConns(d.filter(c => c.dialect === 'SNOWFLAKE'))).catch(() => { }); }, []);

            const exLoadTree = async (cid) => {
                setExLoading('tree'); setExError('');
                try { const d = await API(`/api/explore/schemas?conn_id=${cid}`); setExTree(d); }
                catch (e) { setExError(e.message); }
                setExLoading('');
            };
            const exLoadTables = async (cid, db, schema) => {
                setExSelDb(db); setExSelSchema(schema); setExLoading('tables'); setExError('');
                try { const d = await API(`/api/explore/tables?conn_id=${cid}&database=${db}&schema=${schema}`); setExTables(d.tables || []); }
                catch (e) { setExError(e.message); }
                setExLoading('');
            };
            const exSelectTable = async (tbl) => {
                setExSelTable(tbl); setExLoading('preview'); setExError('');
                try {
                    const [cols, prev] = await Promise.all([
                        API(`/api/explore/columns?conn_id=${exConn}&database=${exSelDb}&schema=${exSelSchema}&table=${tbl}`),
                        API(`/api/explore/preview?conn_id=${exConn}&database=${exSelDb}&schema=${exSelSchema}&table=${tbl}`),
                    ]);
                    setExColumns(cols.columns || []); setExPreview(prev);
                    setExSql(`SELECT * FROM ${exSelDb}.${exSelSchema}.${tbl} LIMIT 100;`);
                    setExSubTab('data');
                } catch (e) { setExError(e.message); }
                setExLoading('');
            };
            const exRunQuery = async () => {
                setExLoading('query'); setExError('');
                try { const d = await API('/api/explore/query', { method: 'POST', body: JSON.stringify({ conn_id: exConn, sql: exSql }) }); setExQueryResult(d); }
                catch (e) { setExError(e.message); }
                setExLoading('');
            };
            useEffect(() => { if (exConn) exLoadTree(exConn); }, [exConn]);

            return (
                <div className="fade-in flex flex-col h-full gap-4" style={{ height: 'calc(100vh - 120px)' }}>
                    <div className="flex items-center gap-4">
                        <span className="text-sm font-bold text-slate-400 uppercase tracking-widest">🔌 Connection</span>
                        <select className="input select" style={{ maxWidth: '320px' }} value={exConn} onChange={e => setExConn(e.target.value)}>
                            <option value="">— Select a Snowflake connection —</option>
                            {conns.map(c => <option key={c.id || c.name} value={c.id || c.name}>{c.name}</option>)}
                        </select>
                        {exLoading && <span className="text-xs text-amber-400 pulse font-mono">{exLoading === 'tree' ? 'Loading schema…' : exLoading === 'tables' ? 'Loading tables…' : exLoading === 'preview' ? 'Loading preview…' : 'Running query…'}</span>}
                        {exError && <span className="text-xs text-rose-400 mono">⚠ {exError}</span>}
                        {exConn && <>
                            <button className="btn btn-ghost btn-sm" onClick={() => exLoadTree(exConn)}>🔄 Refresh</button>
                            <button className="btn btn-danger btn-sm" onClick={async () => { await fetch(`/api/explore/pool/${exConn}`, { method: 'DELETE' }); setExTree([]); setExError('Disconnected — re-select to reconnect'); }}>⏏ Disconnect</button>
                        </>}
                    </div>
                    <div className="flex gap-4 flex-1 overflow-hidden">
                        {/* Left: Schema browser */}
                        <div className="w-64 glass2 rounded-xl flex flex-col overflow-hidden">
                            <div className="px-4 py-3 border-b border-slate-700 flex items-center">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider flex-1">Schema Browser</span>
                                {exConn && exSelDb && exSelSchema && <button className="text-slate-500 hover:text-white text-xs" onClick={() => exLoadTables(exConn, exSelDb, exSelSchema)}>🔄</button>}
                            </div>
                            <div className="overflow-y-auto flex-1 p-2 text-xs">
                                {!exConn && <p className="text-slate-600 italic p-3">Select a connection above</p>}
                                {exTree.map(({ database, schemas }) => (
                                    <div key={database} className="mb-2">
                                        <div className="px-2 py-1 text-slate-400 font-semibold flex items-center gap-1">🗄 {database}</div>
                                        {schemas.map(s => (
                                            <div key={s}>
                                                <div className="px-4 py-1 text-slate-500 cursor-pointer hover:text-indigo-400 flex items-center gap-1"
                                                    onClick={() => exLoadTables(exConn, database, s)}>
                                                    📁 {s} {exSelDb === database && exSelSchema === s && '▾'}
                                                </div>
                                                {exSelDb === database && exSelSchema === s && exTables.map(t => (
                                                    <div key={t.name} onClick={() => exSelectTable(t.name)}
                                                        className={`px-8 py-1 cursor-pointer flex items-center gap-1 ${exSelTable === t.name ? 'text-indigo-400 font-semibold' : 'text-slate-400 hover:text-slate-200'}`}>
                                                        {t.kind === 'view' ? '👁' : '📋'} {t.name}
                                                        {t.rows != null && <span className="ml-auto text-slate-600">{Number(t.rows).toLocaleString()}</span>}
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                        {/* Right: Detail + SQL */}
                        <div className="flex-1 flex flex-col gap-4 overflow-hidden">
                            {/* Table detail */}
                            <div className="glass2 rounded-xl flex flex-col overflow-hidden" style={{ flex: '1 1 0', minHeight: 0 }}>
                                {!exSelTable ? <p className="text-slate-600 italic p-6 text-sm">Click a table in the tree to explore it</p> : (
                                    <>
                                        <div className="flex items-center gap-2 px-4 py-3 border-b border-slate-700">
                                            <span className="font-bold text-slate-200">{exSelTable}</span>
                                            <span className="text-xs text-slate-500">in {exSelDb}.{exSelSchema}</span>
                                            <div className="ml-auto flex gap-2">
                                                {['schema', 'data'].map(t => <button key={t} className={`btn btn-sm ${exSubTab === t ? 'btn-ghost' : 'text-slate-500 btn'}`} onClick={() => setExSubTab(t)}>{t === 'schema' ? '📐 Schema' : '📊 Data'}</button>)}
                                            </div>
                                        </div>
                                        <div className="overflow-auto flex-1">
                                            {exSubTab === 'schema' ? (
                                                <table>
                                                    <thead><tr><th>Column</th><th>Type</th><th>Nullable</th><th>Default</th></tr></thead>
                                                    <tbody>{exColumns.map(c => <tr key={c.name}><td className="mono font-semibold text-indigo-300">{c.name}</td><td className="mono text-xs text-amber-300">{c.type}</td><td className="text-xs">{c.nullable}</td><td className="mono text-xs text-slate-500">{c.default || '—'}</td></tr>)}</tbody>
                                                </table>
                                            ) : (
                                                <div className="overflow-auto">
                                                    <table>
                                                        <thead><tr>{exPreview.columns.map(c => <th key={c}>{c}</th>)}</tr></thead>
                                                        <tbody>{exPreview.rows.map((r, i) => <tr key={i}>{r.map((v, j) => <td key={j} className="mono text-xs max-w-xs truncate">{v === null ? <span className="text-slate-600">NULL</span> : String(v)}</td>)}</tr>)}</tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                            {/* SQL Workshop */}
                            <div className="glass2 rounded-xl p-4 flex flex-col gap-3">
                                <div className="flex items-center justify-between">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">⚡ SQL Workshop</span>
                                    <button className="btn btn-primary btn-sm" onClick={exRunQuery} disabled={!exConn || exLoading === 'query'}>
                                        {exLoading === 'query' ? <span className="spin">⟳</span> : '▶'} Run Query
                                    </button>
                                </div>
                                <textarea className="input mono text-xs" rows={3} value={exSql} onChange={e => setExSql(e.target.value)} />
                                {exQueryResult && (
                                    <div>
                                        <div className="flex items-center gap-4 mb-2 text-xs text-slate-400">
                                            <span>Rows: <b className="text-white">{exQueryResult.rows.length}</b></span>
                                            <span>Affected: <b className="text-white">{exQueryResult.rows_affected}</b></span>
                                            <span>Time: <b className="text-white">{exQueryResult.duration_ms}ms</b></span>
                                        </div>
                                        <div className="overflow-auto" style={{ maxHeight: '200px' }}>
                                            <table>
                                                <thead><tr>{exQueryResult.columns.map(c => <th key={c}>{c}</th>)}</tr></thead>
                                                <tbody>{exQueryResult.rows.map((r, i) => <tr key={i}>{r.map((v, j) => <td key={j} className="mono text-xs">{v === null ? <span className="text-slate-600">NULL</span> : String(v)}</td>)}</tr>)}</tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                                {!exQueryResult && <p className="text-slate-600 text-xs italic">Write SQL above and click Run Query</p>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Connections Tab ─────────────────────────────────────────────────────────
        function ConnectionsTab() {
            const [conns, setConns] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [form, setForm] = useState({ name: '', dialect: 'SNOWFLAKE', account: '', username: '', password: '', warehouse: '', database: '' });
            const [editId, setEditId] = useState(null);
            const [testResult, setTestResult] = useState({});
            const [testing, setTesting] = useState({});
            const [deleteConfirmConn, setDeleteConfirmConn] = useState(null);

            const load = () => API('/api/connections').then(setConns).catch(() => { });
            useEffect(() => { load(); }, []);
            const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

            const save = async () => {
                try {
                    if (editId) await API(`/api/connections/${editId}`, { method: 'PUT', body: JSON.stringify(form) });
                    else await API('/api/connections', { method: 'POST', body: JSON.stringify(form) });
                    setShowForm(false); setEditId(null); setForm({ name: '', dialect: 'SNOWFLAKE', account: '', username: '', password: '', warehouse: '', database: '' });
                    load();
                } catch (e) { alert(e.message); }
            };
            const testConn = async (c) => {
                setTesting(p => ({ ...p, [c.id || c.name]: true }));
                const r = await API('/api/connections/test', { method: 'POST', body: JSON.stringify(c) }).catch(e => ({ status: 'error', logs: [e.message] }));
                setTestResult(p => ({ ...p, [c.id || c.name]: r }));
                setTesting(p => ({ ...p, [c.id || c.name]: false }));
            };

            const confirmDel = (id) => setDeleteConfirmConn(id);
            const executeDel = async () => {
                const id = deleteConfirmConn;
                setDeleteConfirmConn(null);
                if (!id) return;
                try {
                    await API(`/api/connections/${id}`, { method: 'DELETE' });
                    load();
                } catch (e) {
                    alert('Error deleting connection: ' + e.message);
                }
            };

            const DIALECTS = ['SNOWFLAKE', 'POSTGRES', 'MYSQL', 'BIGQUERY', 'SQLITE'];

            return (
                <div className="fade-in space-y-6">
                    <div className="flex items-center justify-between">
                        <div><h1 className="text-2xl font-bold text-white">🔌 Connections</h1><p className="text-sm text-slate-400 mt-1">Manage source and target database adapters</p></div>
                        <div className="flex gap-3">
                            <button className="btn btn-ghost btn-sm" onClick={load}>🔄 Refresh</button>
                            <button className="btn btn-primary" onClick={() => { setShowForm(true); setEditId(null); setForm({ name: '', dialect: 'SNOWFLAKE', account: '', username: '', password: '', warehouse: '', database: '' }); }}>＋ Add Connection</button>
                        </div>
                    </div>
                    {showForm && (
                        <div className="glass2 rounded-xl p-6 border border-indigo-500/30">
                            <h3 className="font-bold text-white mb-4">{editId ? 'Edit Connection' : 'New Connection'}</h3>
                            <div className="grid grid-cols-3 gap-4">
                                <div><label className="label">Name</label><input className="input" value={form.name} onChange={e => set('name', e.target.value)} /></div>
                                <div><label className="label">Dialect</label>
                                    <select className="input select" value={form.dialect} onChange={e => set('dialect', e.target.value)}>
                                        {DIALECTS.map(d => <option key={d}>{d}</option>)}
                                    </select>
                                </div>
                                {form.dialect === 'SNOWFLAKE' && <>
                                    <div><label className="label">Account Locator</label><input className="input" value={form.account || ''} onChange={e => set('account', e.target.value)} placeholder="xy12345-ab67890" /></div>
                                    <div><label className="label">Warehouse</label><input className="input" value={form.warehouse || ''} onChange={e => set('warehouse', e.target.value)} /></div>
                                </>}
                                {form.dialect !== 'SNOWFLAKE' && form.dialect !== 'BIGQUERY' && <>
                                    <div><label className="label">Host</label><input className="input" value={form.host || ''} onChange={e => set('host', e.target.value)} /></div>
                                    <div><label className="label">Port</label><input className="input" value={form.port || ''} onChange={e => set('port', e.target.value)} /></div>
                                </>}
                                <div><label className="label">Database</label><input className="input" value={form.database || ''} onChange={e => set('database', e.target.value)} /></div>
                                <div><label className="label">Username</label><input className="input" value={form.username || ''} onChange={e => set('username', e.target.value)} /></div>
                                <div><label className="label">Password</label><input className="input" type="password" value={form.password || ''} onChange={e => set('password', e.target.value)} /></div>
                            </div>
                            <div className="flex gap-3 mt-4">
                                <button className="btn btn-primary" onClick={save}>💾 Save</button>
                                <button className="btn btn-ghost" onClick={() => { setShowForm(false); setEditId(null); }}>Cancel</button>
                            </div>
                        </div>
                    )}
                    <div className="glass2 rounded-xl overflow-hidden">
                        <table>
                            <thead><tr><th>Name</th><th>Dialect</th><th>Details</th><th>Actions</th></tr></thead>
                            <tbody>
                                {conns.length === 0 && <tr><td colSpan={4} className="text-center text-slate-500 italic py-10">No connections yet</td></tr>}
                                {conns.map(c => (
                                    <React.Fragment key={c.id || c.name}>
                                        <tr>
                                            <td className="font-semibold text-slate-200">{c.name}</td>
                                            <td><span className="badge badge-blue">{c.dialect}</span></td>
                                            <td className="mono text-xs text-slate-400">{c.account || c.host || ''} {c.database ? `/ ${c.database}` : ''}</td>
                                            <td>
                                                <div className="flex gap-2">
                                                    <button className="btn btn-ghost btn-sm" disabled={!!testing[c.id || c.name]} onClick={() => testConn(c)}>{testing[c.id || c.name] ? <span className="spin">⟳</span> : '🔍'} Test</button>
                                                    <button className="btn btn-ghost btn-sm" onClick={() => { setEditId(c.id || c.name); setForm({ ...c }); setShowForm(true); }}>✏️</button>
                                                    <button className="btn btn-danger btn-sm" onClick={() => confirmDel(c.id || c.name)}>🗑</button>
                                                </div>
                                            </td>
                                        </tr>
                                        {testResult[c.id || c.name] && (
                                            <tr><td colSpan={4} className="pb-3">
                                                <div className={`mx-4 p-3 rounded-lg text-xs mono ${testResult[c.id || c.name].status === 'success' ? 'bg-emerald-950/50 text-emerald-300' : 'bg-rose-950/50 text-rose-300'}`}>
                                                    {(testResult[c.id || c.name].logs || []).map((l, i) => <div key={i}>{l}</div>)}
                                                </div>
                                            </td></tr>
                                        )}
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ─── App Shell ───────────────────────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState('dashboard');
            const TABS = [
                { id: 'dashboard', label: '📊 Dashboard' },
                { id: 'jobs', label: '⚡ Jobs' },
                { id: 'explorer', label: '🔍 Explorer' },
                { id: 'connections', label: '🔌 Connections' },
            ];
            return (
                <div style={{ minHeight: '100vh' }}>
                    {/* Header */}
                    <header style={{ background: 'rgba(11,15,26,0.95)', backdropFilter: 'blur(16px)', borderBottom: '1px solid rgba(99,102,241,0.2)', position: 'sticky', top: 0, zIndex: 50 }}>
                        <div style={{ maxWidth: '1400px', margin: '0 auto', padding: '0 24px', display: 'flex', alignItems: 'center', height: '60px', gap: '12px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginRight: '24px' }}>
                                <div style={{ width: '32px', height: '32px', borderRadius: '8px', background: 'linear-gradient(135deg,#6366f1,#8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: '14px' }}>IC</div>
                                <span style={{ fontWeight: 800, fontSize: '16px', color: '#e2e8f0' }}>IntegrityCore</span>
                                <span style={{ fontSize: '10px', color: '#6366f1', background: 'rgba(99,102,241,0.15)', padding: '2px 6px', borderRadius: '4px', fontWeight: 700 }}>v1.0 ENTERPRISE</span>
                            </div>
                            <nav style={{ display: 'flex', gap: '4px', flex: 1 }}>
                                {TABS.map(t => <button key={t.id} className={`nav-btn${tab === t.id ? ' active' : ''}`} onClick={() => setTab(t.id)}>{t.label}</button>)}
                            </nav>
                        </div>
                    </header>
                    {/* Content */}
                    <main style={{ maxWidth: '1400px', margin: '0 auto', padding: '32px 24px' }}>
                        {tab === 'dashboard' && <Dashboard />}
                        {tab === 'jobs' && <JobsTab />}
                        {tab === 'explorer' && <ExplorerTab />}
                        {tab === 'connections' && <ConnectionsTab />}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
